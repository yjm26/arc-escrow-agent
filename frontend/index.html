<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCROW</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #fff;
      color: #000;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 48px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
      border-bottom: 4px solid #000;
      padding-bottom: 10px;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #888;
      margin-bottom: 40px;
    }

    .box {
      border: 3px solid #000;
      padding: 16px;
      margin-bottom: 16px;
    }

    .box-title {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 12px;
      background: #000;
      color: #fff;
      display: inline-block;
      padding: 2px 8px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    label:first-child { margin-top: 0; }

    input {
      width: 100%;
      padding: 8px;
      border: 3px solid #000;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    input:focus { background: #000; color: #fff; }

    button {
      padding: 10px 20px;
      border: 3px solid #000;
      background: #000;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover { background: #fff; color: #000; }

    .btn-outline {
      background: #fff;
      color: #000;
    }

    .btn-outline:hover { background: #000; color: #fff; }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
    }

    .tab {
      padding: 6px 12px;
      border: 3px solid #000;
      font-family: inherit;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      background: #fff;
      color: #000;
      margin-right: -3px;
    }

    .tab:hover { background: #eee; }
    .tab.active { background: #000; color: #fff; }

    .msg {
      margin-top: 10px;
      padding: 8px;
      border: 3px solid #000;
      font-size: 12px;
      font-weight: 700;
      display: none;
    }

    .msg.show { display: block; }
    .msg.ok { background: #000; color: #0f0; }
    .msg.err { background: #000; color: #f00; }
    .msg.info { background: #000; color: #ff0; }

    .wallet-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .wallet-addr { font-weight: 900; }
    .wallet-bal { color: #888; }

    .deal-view {
      display: none;
      margin-top: 16px;
    }

    .deal-view.show { display: block; }

    .deal-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #000;
      font-size: 12px;
    }

    .deal-row:last-child { border: none; }
    .deal-k { color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }

    .badge {
      font-weight: 900;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 6px;
      border: 2px solid;
    }

    .b-empty { border-color: #888; color: #888; }
    .b-funded { border-color: #00f; color: #00f; }
    .b-done { border-color: #0a0; color: #0a0; }
    .b-refund { border-color: #f00; color: #f00; }

    .hidden { display: none !important; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-bottom: 16px;
    }

    .stat {
      border: 3px solid #000;
      padding: 12px;
      text-align: center;
      margin-right: -3px;
    }

    .stat-val { font-size: 24px; font-weight: 900; }
    .stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>

  <h1>ESCROW</h1>
  <div class="sub">trustless usdc on arc</div>

  <!-- Connect -->
  <div id="secConnect">
    <div class="box">
      <div class="box-title">Connect</div>
      <button onclick="connect()" style="width:100%">CONNECT WALLET →</button>
      <div class="msg" id="mConnect"></div>
    </div>
  </div>

  <div id="secMain" class="hidden">

    <!-- Wallet -->
    <div class="box">
      <div class="wallet-info">
        <span class="wallet-addr" id="wAddr"></span>
        <span class="wallet-bal" id="wBal"></span>
      </div>
    </div>

    <!-- Create -->
    <div class="box">
      <div class="box-title">New Deal</div>
      <label>Freelancer</label>
      <input id="iFreelancer" placeholder="0x...">
      <div class="grid">
        <div>
          <label>Amount USDC</label>
          <input id="iAmount" type="number" placeholder="10" min="0.01" step="0.01">
        </div>
        <div>
          <label>Description</label>
          <input id="iDesc" placeholder="landing page">
        </div>
      </div>
      <button onclick="create()" style="width:100%">CREATE DEAL →</button>
      <div class="msg" id="mCreate"></div>
    </div>

    <!-- Manage -->
    <div class="box">
      <div class="box-title">Manage</div>
      <label>Deal ID</label>
      <input id="iDealId" type="number" placeholder="0">
      <div class="tabs">
        <div class="tab active" data-a="fund" onclick="pickTab(this)">FUND</div>
        <div class="tab" data-a="approve" onclick="pickTab(this)">RELEASE</div>
        <div class="tab" data-a="refund" onclick="pickTab(this)">REFUND</div>
        <div class="tab" data-a="view" onclick="pickTab(this)">VIEW</div>
      </div>
      <button id="btnAct" onclick="runAct()" style="width:100%">FUND DEAL →</button>
      <div class="msg" id="mAct"></div>
    </div>

    <!-- Deal Info -->
    <div class="box deal-view" id="dealView">
      <div class="box-title">Deal</div>
      <div id="dealBody"></div>
    </div>

  </div>

  <script>
    const ADDR = "0xd6f0548Db78d50B210493ED545f4Cd1341C20c0B";
    const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";
    const CID = { id: 5042002, hex: "0x4CE4A2" };

    const ABI = [
      "function createDeal(address,uint256,string) external",
      "function fundDeal(uint256) external",
      "function approveDeal(uint256) external",
      "function refundDeal(uint256) external",
      "function getDeal(uint256) external view returns (address,address,uint256,uint8,string)",
      "function totalDeals() external view returns (uint256)"
    ];

    const ERC20 = [
      "function approve(address,uint256) returns (bool)",
      "function allowance(address,address) view returns (uint256)",
      "function balanceOf(address) view returns (uint256)"
    ];

    let prov, sig, ctr, tok, act = "fund";

    function msg(id, t, c) {
      const e = document.getElementById(id);
      e.className = `msg show ${c}`;
      e.textContent = t;
    }

    function pickTab(el) {
      act = el.dataset.a;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      const l = { fund: "FUND DEAL →", approve: "RELEASE →", refund: "REFUND →", view: "VIEW →" };
      document.getElementById("btnAct").textContent = l[act];
    }

    async function connect() {
      if (!window.ethereum) return msg("mConnect", "NO WALLET", "err");
      try {
        prov = new ethers.BrowserProvider(window.ethereum);
        await prov.send("eth_requestAccounts", []);
        sig = await prov.getSigner();
        try {
          await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: CID.hex }] });
        } catch (e) {
          if (e.code === 4902) await window.ethereum.request({
            method: "wallet_addEthereumChain", params: [{
              chainId: CID.hex, chainName: "Arc Testnet",
              rpcUrls: ["https://rpc.testnet.arc.network"],
              nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
              blockExplorerUrls: ["https://testnet.arcscan.app"]
            }]
          });
        }
        tok = new ethers.Contract(USDC, ERC20, sig);
        ctr = new ethers.Contract(ADDR, ABI, sig);
        const a = await sig.getAddress();
        const b = await prov.getBalance(a);
        document.getElementById("secConnect").classList.add("hidden");
        document.getElementById("secMain").classList.remove("hidden");
        document.getElementById("wAddr").textContent = a.slice(0,6) + "…" + a.slice(-4);
        document.getElementById("wBal").textContent = parseFloat(ethers.formatEther(b)).toFixed(2) + " USDC";
      } catch (e) { msg("mConnect", e.message, "err"); }
    }

    async function create() {
      const f = document.getElementById("iFreelancer").value;
      const a = document.getElementById("iAmount").value;
      const d = document.getElementById("iDesc").value;
      if (!f || !a || !d) return msg("mCreate", "FILL ALL FIELDS", "err");
      try {
        msg("mCreate", "CREATING...", "info");
        const tx = await ctr.createDeal(f, ethers.parseUnits(a, 6), d);
        const r = await tx.wait();
        const ev = r.logs.find(l => l.fragment?.name === "DealCreated");
        const id = ev ? ev.args[0].toString() : "?";
        msg("mCreate", "DEAL #" + id + " CREATED", "ok");
        document.getElementById("iDealId").value = id;
      } catch (e) { msg("mCreate", e.reason || e.message, "err"); }
    }

    async function runAct() {
      const id = document.getElementById("iDealId").value;
      if (id === "") return msg("mAct", "ENTER DEAL ID", "err");
      try {
        if (act === "fund") {
          msg("mAct", "CHECKING...", "info");
          const deal = await ctr.getDeal(id);
          const alw = await tok.allowance(await sig.getAddress(), ADDR);
          if (alw < deal[2]) {
            msg("mAct", "APPROVING...", "info");
            await (await tok.approve(ADDR, deal[2])).wait();
          }
          msg("mAct", "FUNDING...", "info");
          await (await ctr.fundDeal(id)).wait();
          msg("mAct", "DEAL #" + id + " FUNDED", "ok");
        } else if (act === "approve") {
          msg("mAct", "RELEASING...", "info");
          await (await ctr.approveDeal(id)).wait();
          msg("mAct", "DEAL #" + id + " RELEASED", "ok");
        } else if (act === "refund") {
          msg("mAct", "REFUNDING...", "info");
          await (await ctr.refundDeal(id)).wait();
          msg("mAct", "DEAL #" + id + " REFUNDED", "ok");
        } else {
          const deal = await ctr.getDeal(id);
          const [c, f, amt, st, desc] = deal;
          const nn = ["EMPTY", "FUNDED", "DONE", "REFUNDED"];
          const nc = ["b-empty", "b-funded", "b-done", "b-refund"];
          document.getElementById("dealView").classList.add("show");
          document.getElementById("dealBody").innerHTML = `
            <div class="deal-row"><span class="deal-k">ID</span><span>#${id}</span></div>
            <div class="deal-row"><span class="deal-k">STATUS</span><span class="badge ${nc[st]}">${nn[st]}</span></div>
            <div class="deal-row"><span class="deal-k">DESC</span><span>${desc}</span></div>
            <div class="deal-row"><span class="deal-k">AMOUNT</span><span>${ethers.formatUnits(amt, 6)} USDC</span></div>
            <div class="deal-row"><span class="deal-k">CLIENT</span><span style="font-size:10px">${c}</span></div>
            <div class="deal-row"><span class="deal-k">WORKER</span><span style="font-size:10px">${f}</span></div>
          `;
          msg("mAct", "LOADED", "ok");
        }
      } catch (e) { msg("mAct", e.reason || e.message, "err"); }
    }
  </script>
</body>
</html>
